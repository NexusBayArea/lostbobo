[project]
name = "simhpc-backend"
version = "3.5.0"
dependencies = [
    "reportlab",
    "qrcode[pil]",
    "requests",
    "supervisor",
    "pandas",
    "fastapi",
    "uvicorn",
    "pydantic-settings"
]

[tool.setuptools]
# Only include directories that exist and contain __init__.py
packages = ["app", "packages", "autoscaler", "compiler", "infra", "tools", "worker"]

[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[tool.ruff]
line-length = 120

[tool.ruff.lint]
# Add B008, E402, and B904 to the ignore list
ignore = ["E402", "B008", "B904", "E501"]
select = ["E", "F", "B", "UP"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
