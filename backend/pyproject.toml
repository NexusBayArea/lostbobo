[project]
name = "simhpc"
version = "3.5.0"
dependencies = [
    "reportlab",
    "qrcode[pil]",
    "requests",
    "pandas",
    "fastapi",
    "uvicorn",
    "pydantic-settings",
    "numpy",
    "pillow",
    "python-dotenv",
    "annotated-doc",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["backend*", "tools*"]

[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[tool.ruff]
line-length = 120
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "B", "UP"]
ignore = ["E402", "B008", "B904", "E501", "UP042", "B007"]
fixable = ["ALL"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
