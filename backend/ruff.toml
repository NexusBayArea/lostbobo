target-version = "py311"
line-length = 120

[lint]
select = ["E", "F", "I", "B", "UP", "N"]
ignore = ["UP042", "E501"]

fixable = ["ALL"]
unfixable = []

[lint.isort]
known-first-party = ["backend", "skills"]
section-order = ["future", "standard-library", "third-party", "first-party", "local-folder"]

[format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
