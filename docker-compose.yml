version: '3.8'

services:
  # 1. The Message Broker (Queue Metrics)
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # 2. The Autoscaler v2.2.1
  autoscaler:
    build:
      context: .
      dockerfile: Dockerfile.autoscaler
    depends_on:
      redis:
        condition: service_healthy
    env_file: .env.local
    environment:
      - REDIS_URL=redis://redis:6379
      - MAX_PODS=3
      - IDLE_TERMINATION_S=300
      - QUEUE_THRESHOLD=5
    restart: always

  # 3. Local Mock Worker (For testing logic without a GPU)
  mock-worker:
    image: python:3.11-slim
    volumes:
      - ./src:/app
    working_dir: /app
    environment:
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=${DATABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
    command: python -u mock_worker.py
    depends_on:
      redis:
        condition: service_healthy
