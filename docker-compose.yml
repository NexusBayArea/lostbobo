version: '3.8'

services:
  # 1. The Message Broker (Redis)
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # 2. The Orchestrator (Mercury AI / FastAPI)
  api:
    build: 
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - SIMHPC_API_KEY=${SIMHPC_API_KEY}
      - RUNPOD_API_KEY=${RUNPOD_API_KEY}
      - RUNPOD_POD_ID=${RUNPOD_POD_ID}
    depends_on:
      redis:
        condition: service_healthy

  # 3. The Physics Engine (Sim Worker)
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      - REDIS_URL=redis://redis:6379/0
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - RUNPOD_POD_ID=local-tester-01
      - MAX_CONCURRENT_JOBS=2
      - INCEPTION_API_KEY=${INCEPTION_API_KEY}
      - MERCURY_API_KEY=${MERCURY_API_KEY}
    depends_on:
      redis:
        condition: service_healthy
