version: "3.9"

services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - simhpc-net

  kernel:
    build:
      context: ../../../
      dockerfile: deployments/docker/images/kernel/Dockerfile
    ports:
      - "8000:8000"
    environment:
      INFISICAL_TOKEN: ${INFISICAL_TOKEN}
      OLLAMA_ENDPOINT: http://ollama:11434
      SIMHPC_RUNTIME: kernel
    depends_on:
      - ollama
      - postgres
    networks:
      - simhpc-net

  gpu-worker:
    build:
      context: ../../../
      dockerfile: deployments/docker/images/gpu/Dockerfile
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      INFISICAL_TOKEN: ${INFISICAL_TOKEN}
      SIMHPC_RUNTIME: gpu-worker
    depends_on:
      - kernel
    networks:
      - simhpc-net

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: simhpc
      POSTGRES_USER: simhpc
      POSTGRES_PASSWORD: simhpc
    ports:
      - "5432:5432"
    networks:
      - simhpc-net

volumes:
  ollama_data:

networks:
  simhpc-net:
