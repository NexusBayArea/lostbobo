global:
  resolve_timeout: 5m

templates:
  - '/etc/alertmanager/templates/*.tmpl'

route:
  group_by: ['alertname', 'severity', 'category']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

  receiver: 'default'

  routes:
    - matchers:
        - severity = "critical"
        - category = "ml"
      receiver: 'ml-critical'
      group_interval: 2m

    - matchers:
        - severity = "critical"
        - category =~ "compliance|security|audit"
      receiver: 'compliance-critical'
      group_interval: 1m

    - matchers:
        - severity = "warning"
        - category = "ml"
      receiver: 'ml-warning'

    - matchers:
        - severity = "warning"
      receiver: 'team-warning'

receivers:
  - name: 'default'
    webhook_configs:
      - url: 'https://hooks.simhpc.com/alerts/default'

  - name: 'ml-critical'
    webhook_configs:
      - url: 'https://hooks.simhpc.com/alerts/ml-critical'
        send_resolved: true
    email_configs:
      - to: 'ml-team@simhpc.com'
        send_resolved: true

  - name: 'compliance-critical'
    webhook_configs:
      - url: 'https://hooks.simhpc.com/alerts/compliance-critical'
        send_resolved: true
    email_configs:
      - to: 'compliance@simhpc.com,isso@simhpc.com'
        send_resolved: true
    pagerduty_configs:
      - routing_key: '<your-pagerduty-integration-key>'
        send_resolved: true

  - name: 'ml-warning'
    webhook_configs:
      - url: 'https://hooks.simhpc.com/alerts/ml-warning'
        send_resolved: true

  - name: 'team-warning'
    webhook_configs:
      - url: 'https://hooks.simhpc.com/alerts/team-warning'
        send_resolved: true

inhibit_rules:
  - source_matchers:
      - severity = "critical"
    target_matchers:
      - severity = "warning"
    equal: ['alertname', 'category']
