global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'severity', 'category']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'default'

  routes:
    - matchers:
        - priority = "critical"
      receiver: 'ml-critical'

    - matchers:
        - severity = "critical"
        - category = "ml"
      receiver: 'ml-critical'

    - matchers:
        - severity = "critical"
        - category =~ "compliance|security|audit"
      receiver: 'compliance-critical'

    - matchers:
        - severity = "warning"
        - category = "ml"
      receiver: 'ml-warning'

    - matchers:
        - severity = "warning"
      receiver: 'team-warning'

receivers:
  - name: 'default'
    webhook_configs:
      - url: 'https://hooks.simhpc.com/alerts/default'
        send_resolved: true

  - name: 'ml-critical'
    webhook_configs:
      - url: 'https://hooks.simhpc.com/alerts/ml-critical'
        send_resolved: true
        http_config:
          basic_auth:
            username: 'simhpc'
            password_file: '/etc/alertmanager/ml-webhook-secret'
    email_configs:
      - to: 'ml-team@simhpc.com'

  - name: 'compliance-critical'
    webhook_configs:
      - url: 'https://hooks.simhpc.com/alerts/compliance-critical'
        send_resolved: true
    email_configs:
      - to: 'compliance@simhpc.com,isso@simhpc.com'
    pagerduty_configs:
      - routing_key_file: '/etc/alertmanager/pagerduty-key'

  - name: 'ml-warning'
    webhook_configs:
      - url: 'https://hooks.simhpc.com/alerts/ml-warning'
        send_resolved: true

  - name: 'team-warning'
    webhook_configs:
      - url: 'https://hooks.simhpc.com/alerts/team-warning'
        send_resolved: true

inhibit_rules:
  - source_matchers:
      - severity = "critical"
    target_matchers:
      - severity = "warning"
    equal: ['alertname', 'category']
