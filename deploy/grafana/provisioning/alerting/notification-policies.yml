apiVersion: 1
policies:
  - orgId: 1
    receiver: email-team
    group_by: ['alertname', 'category', 'severity']
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
    routes:
      # Critical Security & Governance
      - matchers:
          - severity = critical
          - category =~ "security|governance"
        receiver: pagerduty-critical
        group_interval: 1m
        repeat_interval: 10m
        continue: true

      # Webhook for All Critical Alerts
      - matchers:
          - severity = critical
        receiver: simhpc-webhook
        continue: true

      # Chaos & Resilience
      - matchers:
          - category =~ "chaos|resilience"
        receiver: slack-engineering
        mute_timings:
          - "maintenance-window"
        continue: true

      # Dedicated webhook for Chaos & Load Testing
      - matchers:
          - category =~ "chaos|load|performance"
        receiver: simhpc-webhook
        group_interval: 8m

      # Load + Performance
      - matchers:
          - category =~ "load|performance"
        receiver: slack-engineering
        group_interval: 10m

      # High GenAI Fallback & Physics Failures
      - matchers:
          - alertname =~ "CriticalGenAIFallbackRate|CriticalPhysicsFailureRate"
        receiver: slack-engineering
        continue: true  # also send to email
