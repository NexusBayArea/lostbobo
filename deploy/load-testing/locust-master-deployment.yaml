apiVersion: apps/v1
kind: Deployment
metadata:
  name: locust-master
  namespace: simhpc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: locust
      role: master
  template:
    metadata:
      labels:
        app: locust
        role: master
    spec:
      containers:
      - name: master
        image: simhpc-locust:latest
        command: ["locust", "-f", "/mnt/locust/locustfile.py", "--master", "--host=http://simhpc-api.simhpc.svc.cluster.local:8000"]
        ports:
        - containerPort: 8089
        - containerPort: 5557
---
apiVersion: v1
kind: Service
metadata:
  name: locust-master
  namespace: simhpc
spec:
  type: LoadBalancer
  ports:
  - port: 8089
    targetPort: 8089
  selector:
    app: locust
    role: master
