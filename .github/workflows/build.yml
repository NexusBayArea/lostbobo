name: Build and Deploy

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - gateway
          - rag-service
          - module-runtime
          - worker

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/${{ matrix.service }}/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/simhpc-${{ matrix.service }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/simhpc-${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  test:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Start services
        run: |
          docker compose -f deployment/docker-compose.yml up -d
          sleep 15
          bash deployment/scripts/validate-cpu.sh || sleep 15

      - name: Run integration tests
        run: |
          pip install pytest httpx grpcio
          pytest tests/integration/ -v

      - name: Cleanup
        if: always()
        run: docker compose -f deployment/docker-compose.yml down

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - name: Check secrets presence
        id: check_secrets
        run: |
          if [ -z "$HOST" ] || [ -z "$SSH_KEY" ]; then
            echo "VPS secrets not configured – skipping deploy."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
        env:
          HOST: ${{ secrets.DROP_PUBLIC_IPV4 }}
          SSH_KEY: ${{ secrets.DROP_SSH_KEY }}

      - name: Deploy to VPS
        if: steps.check_secrets.outputs.skip == 'false'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DROP_PUBLIC_IPV4 }}
          username: ${{ secrets.DROP_LOG_IN || 'root' }}
          key: ${{ secrets.DROP_SSH_KEY }}
          script: |
            cd ~/simhpc-gamma
            git pull origin main
            docker compose -f deployment/docker-compose.yml pull
            docker compose -f deployment/docker-compose.yml up -d --remove-orphans
            bash deployment/scripts/health-check.sh
