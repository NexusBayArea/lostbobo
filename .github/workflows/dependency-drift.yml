name: Dependency Drift Detection

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  DRIFT_TEST_IMPORT: "app.core.config"
  SB_URL: "http://localhost:8000"
  SB_TOKEN: "ci-stub"
  SB_SECRET_KEY: "ci-stub-secret"
  SB_JWT_SECRET: "ci-stub-jwt"
  SB_PUB_KEY: "ci-stub-pubkey"
  SB_DATA_URL: "http://localhost:8001"

jobs:
  dependency-drift:
    name: Check Dependency Lock
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_ENV

      - name: Install Python deps
        run: pip install pyyaml

      - name: Hermetic Dependency Kernel Check
        run: python tools/deps/hermetic_lock.py

      - name: Validate install consistency
        run: |
          uv venv .ci-venv
          uv pip install --python .ci-venv/bin/python -r requirements.lock
          .ci-venv/bin/python -c "import fastapi, pydantic, yaml; print('Runtime imports OK')"

      - name: Install package and run drift script
        run: |
          uv pip install --python .ci-venv/bin/python -e .
          .ci-venv/bin/python tools/check_dependency_drift.py
        env:
          PYTHONPATH: ${{ github.workspace }}/src

      - name: Hint on failure
        if: failure() && github.event_name == 'pull_request'
        run: |
          echo "Fix: python tools/deps/hermetic_lock.py --write"
          echo "Then: git add requirements.lock && git commit -m 'chore: update lockfile'"
