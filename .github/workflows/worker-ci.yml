      #     curl -X POST "${{ secrets.SUPABASE_URL }}/rest/v1/worker_versions" \
      #       -H "apikey: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
      #       -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
      #       -H "Content-Type: application/json" \
      #       -d "{
      #         \"image\": \"ghcr.io/${{ github.repository_owner }}/simhpc-worker:${{ env.TAG }}\",
      #         \"status\": \"pending\"
      #       }"

