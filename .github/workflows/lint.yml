name: "v2.5.0 Beta Hardening: Ruff Lint"

on:
  push:
    branches: [main, v2.5.0-DEV]
  pull_request:
    branches: [main]

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: false

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Ruff
        run: pip install ruff

      - name: Run Ruff Check
        run: ruff check services/worker/worker.py

      - name: Run Ruff Format Check
        run: ruff format --check services/worker/worker.py
