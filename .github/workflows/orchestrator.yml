name: SimHPC SaaS Orchestrator (v2.8.6)

on:
  push:
    branches: [main]

jobs:
  self-heal-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Fix for the "Driver/Cache" error
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      # Self-Correction logic to stop the 10-hour loop
      - name: Self-Heal Codebase
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          export PATH="$HOME/.local/bin:$PATH"
          uv pip install ruff
          uv run ruff check . --fix --select F401,I || true
          sed -i 's/import httpx/import httpx  # noqa: E402/g' app/services/worker/worker.py || true

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # FIX: Hardcoded lowercase name to prevent "invalid tag" error
      - name: Build & Push Unified Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/images/Dockerfile.unified
          push: true
          tags: |
            ghcr.io/nexusbayarea/simhpc-unified:latest
            ghcr.io/nexusbayarea/simhpc-unified:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max