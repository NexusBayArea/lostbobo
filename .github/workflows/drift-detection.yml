name: "v3.5.0 Dependency Drift Detection"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  dependency-drift:
    name: Verify Lockfile Integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Verify clean install from pinned requirements
        run: |
          echo "🔍 Verifying pinned requirements install cleanly..."
          uv venv
          source .venv/bin/activate
          uv pip install -r backend/requirements.txt
          echo "✅ All pinned packages resolved successfully"

      - name: Runtime import check
        run: |
          source .venv/bin/activate
          export PYTHONPATH=$GITHUB_WORKSPACE
          python3 -c "from backend.app.gateway import app; print('✅ Gateway import OK')"

      - name: JIT loader check
        run: |
          source .venv/bin/activate
          export PYTHONPATH=$GITHUB_WORKSPACE
          python3 -c "from backend.compiler.runtime.loader import JITLoader; print('✅ JIT Loader OK')"
