name: Deploy SimHPC Worker to RunPod (Deprecated — use deploy.yml)

on:
  push:
    branches: ["main"]
    paths:
      - "services/worker/worker.py"
      - "Dockerfile.worker"
      - "services/worker/requirements.txt"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKER_ACCESS_TOKEN }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build and Push Worker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.worker
          push: true
          tags: |
            simhpcworker/simhpc-worker:latest
            simhpcworker/simhpc-worker:v2.5.0

      - name: Restart RunPod Worker Pod
        run: |
          curl -X POST "https://api.runpod.io/graphql" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.RUNPOD_API_KEY }}" \
            -d '{
              "query": "mutation { podRestart(podId: \"${{ secrets.RUNPOD_POD_ID }}\") { id status } }"
            }'
