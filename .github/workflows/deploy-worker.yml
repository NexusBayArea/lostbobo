name: Deploy SimHPC Worker to RunPod

on:
  push:
    branches: [ "main" ]
    paths:
      - 'services/runpod-worker/worker.py'
      - 'Dockerfile.worker'
      - 'requirements.worker.txt'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Worker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.worker
          push: true
          tags: |
            simhpcworker/simhpc-worker:v2.1.2
            simhpcworker/simhpc-worker:latest
          env:
            DOCKER_BUILDKIT: "1"

      - name: Restart RunPod Worker Pod
        run: |
          curl -X POST "https://api.runpod.io/graphql" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.RUNPOD_API_KEY }}" \
            -d '{
              "query": "mutation { podRestart(podId: \"${{ secrets.RUNPOD_POD_ID }}\") { id status } }"
            }'
