name: Deploy to RunPod

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Pod action'
        required: true
        default: 'restart'
        type: choice
        options:
          - restart
          - stop
          - start

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy-runpod:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Install Infisical CLI
        run: |
          curl -1sLf 'https://dl.cloudsmith.io/public/infisical/infisical-cli/setup.deb.sh' | sudo bash
          sudo apt-get update && sudo apt-get install -y infisical

      - name: Deploy to RunPod via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.RUN_POD_SSH_HOST }}
          username: ${{ secrets.RUN_POD_SSH_USER }}
          key: ${{ secrets.RUN_POD_SSH_KEY }}
          port: ${{ secrets.RUN_POD_SSH_PORT }}
          envs: INFISICAL_TOKEN
          script: |
            echo "Pulling latest worker image..."
            docker pull simhpcworker/simhpc-worker:latest
            
            echo "Restarting container..."
            docker stop simhpc-worker || true
            docker rm simhpc-worker || true
            
            docker run -d --name simhpc-worker \
              --gpus all \
              -e INFISICAL_TOKEN="$INFISICAL_TOKEN" \
              simhpcworker/simhpc-worker:latest
            
            echo "Container restarted with latest image"
