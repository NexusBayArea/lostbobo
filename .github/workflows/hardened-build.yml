name: Hardened Build & Push

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_run:
    workflows: ["Deterministic API CI"]
    types: [completed]
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: nexusbayarea/simhpc-worker

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build and Push Image
    runs-on: ubuntu-latest
    if: |
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'

    outputs:
      image_digest: ${{ steps.build.outputs.digest }}
      image_ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
      sha_tag: ${{ github.sha }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (SHA tag only)
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/images/Dockerfile.unified
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Record build metadata
        run: |
          mkdir -p build-metadata
          python3 -c "
          import json, os
          meta = {
              'sha': '${{ github.sha }}',
              'digest': '${{ steps.build.outputs.digest }}',
              'timestamp': '$(date -u +%Y-%m-%dT%H:%M:%SZ)',
              'branch': '${{ github.ref_name }}',
              'image_ref': '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}'
          }
          print(json.dumps(meta, indent=2))
          with open('build-metadata/build.json', 'w') as f:
              json.dump(meta, f, indent=2)
          "
          cat build-metadata/build.json

      - name: Upload metadata artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-metadata-${{ github.sha }}
          path: build-metadata/
          retention-days: 90

  promote-to-prod:
    name: Promote to Production
    needs: build-and-push
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' || github.event_name == 'workflow_run') &&
      (github.ref == 'refs/heads/main' ||
       (github.event.workflow_run != null && github.event.workflow_run.head_branch == 'main'))
    environment: production

    steps:
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Promote SHA digest to prod tag
        run: |
          DIGEST="${{ needs.build-and-push.outputs.image_digest }}"
          IMAGE_BASE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"

          echo "Promoting digest $DIGEST to :prod..."
          docker pull "$IMAGE_BASE@$DIGEST"
          docker tag  "$IMAGE_BASE@$DIGEST" "$IMAGE_BASE:prod"
          docker push "$IMAGE_BASE:prod"

          echo "Promoted $DIGEST to prod"

      - name: Write step summary
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" << 'SUMMARY'
          ## Production Promotion Complete

          | Field | Value |
          |-------|-------|
          SUMMARY
          echo "| SHA | \`${{ github.sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Digest | \`${{ needs.build-and-push.outputs.image_digest }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Mutable tag | \`:prod\` (convenience only) |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Immutable deployment reference:**" >> "$GITHUB_STEP_SUMMARY"
          echo "\`${{ needs.build-and-push.outputs.image_ref }}\`" >> "$GITHUB_STEP_SUMMARY"