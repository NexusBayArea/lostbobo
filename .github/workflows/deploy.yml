name: Deploy SimHPC

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_LOGIN }}
          password: ${{ secrets.DOCKER_PW_TOKEN }}

      - name: Build & Push Unified Image
        run: |
          docker build -f Dockerfile.unified -t simhpcworker/simhpc-unified:latest .
          docker push simhpcworker/simhpc-unified:latest

      - name: Deploy to RunPod (podReset with fallback)
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
          RUNPOD_ID: ${{ secrets.RUNPOD_ID }}
        run: |
          echo "Checking pod status for: $RUNPOD_ID"
          
          status_response=$(curl -s -X POST "https://api.runpod.io/graphql" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $RUNPOD_API_KEY" \
            -d "{\"query\": \"query { pod(input: { podId: \\\"$RUNPOD_ID\\\" }) { id desiredStatus } }\"}")
          echo "Current status: $status_response"
          
          # Try podReset first
          echo "Attempting podReset..."
          RESPONSE=$(curl -s -X POST "https://api.runpod.io/graphql" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $RUNPOD_API_KEY" \
            -d "{\"query\": \"mutation { podReset(input: { podId: \\\"$RUNPOD_ID\\\" }) { id } }\"}")
          echo "podReset response: $RESPONSE"
          
          if echo "$RESPONSE" | grep -q "\"errors\""; then
            echo "podReset failed, falling back to stop+resume cycle..."
            
            # Fallback: podStop
            echo "Stopping pod..."
            stop_resp=$(curl -s -X POST "https://api.runpod.io/graphql" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer $RUNPOD_API_KEY" \
              -d "{\"query\": \"mutation { podStop(input: { podId: \\\"$RUNPOD_ID\\\" }) { id } }\"}")
            echo "Stop: $stop_resp"
            sleep 5
            
            # Fallback: podResume
            echo "Resuming pod..."
            resume_resp=$(curl -s -X POST "https://api.runpod.io/graphql" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer $RUNPOD_API_KEY" \
              -d "{\"query\": \"mutation { podResume(input: { podId: \\\"$RUNPOD_ID\\\", gpuCount: 1 }) { id } }\"}")
            echo "Resume: $resume_resp"
            
            if echo "$resume_resp" | grep -q "\"errors\""; then
              echo "Fallback failed!"
              exit 1
            fi
            echo "Pod cycle completed"
          else
            echo "Pod reset successfully"
          fi