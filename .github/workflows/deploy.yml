name: "v2.5.0 Production Deployment"

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  id-token: write
  contents: read

jobs:
  # Job 1: The Quality Gate
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Ruff
        run: pip install ruff

      - name: Lint Check
        run: ruff check services/worker/worker.py services/api/api.py

      - name: Format Check
        run: ruff format --check services/worker/worker.py services/api/api.py

  # Job 2: Build & Push Worker Image (RunPod)
  deploy-worker:
    needs: audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch secrets from Infisical
        uses: Infisical/secrets-action@v1.0.9
        with:
          method: "oidc"
          identity-id: "${{ vars.INFISICAL_IDENTITY_ID }}"
          project-slug: "${{ vars.INFISICAL_PROJECT_SLUG }}"
          env-slug: "prod"

      - name: Login to Docker Hub
        run: echo "$DOCKER_ACCESS_TOKEN" | docker login -u "$DOCKER_USERNAME" --password-stdin

      - name: Build and Push Worker
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.worker
          push: true
          tags: |
            simhpcworker/simhpc-worker:latest
            simhpcworker/simhpc-worker:v2.5.0

  # Job 3: Build & Push Autoscaler Image (RunPod)
  deploy-autoscaler:
    needs: audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch secrets from Infisical
        uses: Infisical/secrets-action@v1.0.9
        with:
          method: "oidc"
          identity-id: "${{ vars.INFISICAL_IDENTITY_ID }}"
          project-slug: "${{ vars.INFISICAL_PROJECT_SLUG }}"
          env-slug: "prod"

      - name: Login to Docker Hub
        run: echo "$DOCKER_ACCESS_TOKEN" | docker login -u "$DOCKER_USERNAME" --password-stdin

      - name: Build and Push Autoscaler
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.autoscaler
          push: true
          tags: |
            simhpcworker/simhpc-autoscaler:latest
            simhpcworker/simhpc-autoscaler:v2.5.0

  # Job 4: Deploy Frontend (Vercel)
  deploy-vercel:
    needs: audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch secrets from Infisical
        uses: Infisical/secrets-action@v1.0.9
        with:
          method: "oidc"
          identity-id: "${{ vars.INFISICAL_IDENTITY_ID }}"
          project-slug: "${{ vars.INFISICAL_PROJECT_SLUG }}"
          env-slug: "prod"

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v20
        with:
          vercel-token: $VERCEL_TOKEN
          vercel-org-id: $VERCEL_ORG_ID
          vercel-project-id: $VERCEL_PROJECT_ID
          vercel-args: "--prod"
          vercel-envs: |
            VITE_API_URL=$PROD_API_URL
            VITE_SUPABASE_URL=$VITE_SUPABASE_URL
            VITE_SUPABASE_ANON_KEY=$VITE_SUPABASE_ANON_KEY
