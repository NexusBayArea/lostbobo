name: Deploy SimHPC Gamma (Deprecated — use build.yml)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - kernel
          - rag-service
          - module-runtime
          - worker-service
          - gpu-worker
          - telemetry

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/${{ matrix.service }}/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/simhpc-${{ matrix.service }}:${{ env.RUNTIME_VERSION }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/simhpc-${{ matrix.service }}:latest
          build-args: |
            RUNTIME_VERSION=${{ env.RUNTIME_VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - name: Check secrets presence
        id: check_secrets
        run: |
          if [ -z "$HOST" ] || [ -z "$SSH_KEY" ]; then
            echo "VPS secrets not configured – skipping deploy."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
        env:
          HOST: ${{ secrets.DROP_PUBLIC_IPV4 }}
          SSH_KEY: ${{ secrets.DROP_SSH_KEY }}

      - name: Deploy to VPS
        if: steps.check_secrets.outputs.skip == 'false'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DROP_PUBLIC_IPV4 }}
          username: ${{ secrets.DROP_LOG_IN || 'root' }}
          key: ${{ secrets.DROP_SSH_KEY }}
          script: |
            cd ~/simhpc-gamma
            git pull origin main
            docker compose -f deployment/docker-compose.yml pull
            docker compose -f deployment/docker-compose.yml up -d --remove-orphans
            bash deployment/scripts/health-check.sh
