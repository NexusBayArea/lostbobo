name: Deploy to Docker Hub

on:
  push:
    branches:
      - main
    paths:
      - 'services/worker/**'
      - '.github/workflows/deploy.yml'
      - 'Dockerfile.worker'
      - 'Dockerfile.autoscaler'
      - 'Dockerfile.unified'
  workflow_dispatch:

jobs:
  deploy-docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install Infisical CLI
        run: |
          curl -1sLf \
            'https://dl.cloudsmith.io/public/infisical/infisical-cli/setup.deb.sh' \
            | sudo -E bash
          sudo apt-get update
          sudo apt-get install infisical -y

      - name: Export Docker credentials from Infisical
        env:
          INFISICAL_TOKEN: ${{ secrets.INFISICAL_TOKEN }}
          INFISICAL_PROJECT_ID: f8464ba0-1b93-45a1-86b5-c8ea5a81a2a4
        run: |
          eval "$(infisical export --env=production --format=export)"
          echo "DOCKER_USER=$DOCKER_USERNAME" >> $GITHUB_ENV
          echo "DOCKER_PASS=$DOCKER_PASSWORD" >> $GITHUB_ENV

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USER }}
          password: ${{ env.DOCKER_PASS }}

      - name: Build and push unified image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.unified
          push: true
          tags: |
            simhpcworker/simhpc-unified:latest
            simhpcworker/simhpc-unified:v2.5.6

      - name: Build and push worker image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.worker
          push: true
          tags: |
            simhpcworker/simhpc-worker:latest
            simhpcworker/simhpc-worker:v2.5.6

      - name: Build and push autoscaler image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.autoscaler
          push: true
          tags: |
            simhpcworker/simhpc-autoscaler:latest
            simhpcworker/simhpc-autoscaler:v2.5.6