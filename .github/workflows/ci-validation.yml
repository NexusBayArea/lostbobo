name: CI Validation (v3.3.0)

on:
  push:
    branches: [main]
  pull_request:

env:
  SERVICE_ROLE: api

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python + uv (cached)
        uses: ./.github/actions/setup-python-env

      - name: Linting (Ruff)
        run: |
          /home/runner/.local/bin/uvx ruff check . --fix --select F401,I || true
          /home/runner/.local/bin/uvx ruff check .

      - name: Testing (Pytest)
        env:
          SB_URL: http://test-backbone
          SB_DATA_URL: http://test-data
          SB_JWT_SECRET: test-secret
          SB_PUB_KEY: test-pub
          SB_SECRET_KEY: test-key
          SB_TOKEN: test-token
        run: |
          /home/runner/.local/bin/uv run pytest

      - name: API Structural Check
        env:
          SB_URL: http://test-backbone
          SB_DATA_URL: http://test-data
          SB_JWT_SECRET: test-secret
          SB_PUB_KEY: test-pub
          SB_SECRET_KEY: test-key
          SB_TOKEN: test-token
        run: |
          /home/runner/.local/bin/uv run python -c "from app.api.main import app; print('API imports OK')"

      - name: Structure Check
        run: |
          test -f ./docker/images/Dockerfile.unified
          echo "Repository structure valid"

      - name: Report git SHA
        run: |
          echo "GIT_SHA=${{ github.sha }}" >> $GITHUB_OUTPUT