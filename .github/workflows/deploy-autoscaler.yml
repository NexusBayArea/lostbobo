name: Deploy Autoscaler

on:
  push:
    branches:
      - main
    paths:
      - 'services/worker/runpod_api.py'
      - 'services/worker/autoscaler.py'
      - '.github/workflows/deploy-autoscaler.yml'
      - 'Dockerfile.autoscaler'
      - 'services/worker/requirements-autoscaler.txt'
  workflow_dispatch:

jobs:
  deploy-autoscaler:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Infisical CLI
        run: |
          curl -1sLf 'https://dl.cloudsmith.io/public/infisical/infisical-cli/setup.deb.sh' | sudo bash
          sudo apt-get update && sudo apt-get install -y infisical

      - name: Initialize Infisical
        run: |
          infisical init --projectId=f8464ba0-1b93-45a1-86b5-c8ea5a81a2a4 --plaintext-output || true

      - name: Build and push autoscaler image
        run: |
          infisical run --projectId=f8464ba0-1b93-45a1-86b5-c8ea5a81a2a4 --env=prod -- bash -c '
            echo "$DOCKER_ACCESS_TOKEN" | docker login -u "$DOCKER_USERNAME" --password-stdin
            
            docker build -f ./Dockerfile.autoscaler -t simhpcworker/simhpc-autoscaler:latest .
            docker push simhpcworker/simhpc-autoscaler:latest
          '
