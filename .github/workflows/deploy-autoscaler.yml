name: Deploy SimHPC Autoscaler to Docker Hub

on:
  push:
    branches: [ "main" ]
    paths:
      - 'services/runpod-worker/runpod_api.py'
      - 'services/runpod-worker/app/idle_timeout.py'
      - 'Dockerfile.autoscaler'
      - 'services/runpod-worker/requirements-autoscaler.txt'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Autoscaler Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.autoscaler
          push: true
          tags: |
            simhpcworker/simhpc-autoscaler:v2.2.0
            simhpcworker/simhpc-autoscaler:latest
          env:
            DOCKER_BUILDKIT: "1"
