name: Unified Kernel CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  kernel:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      PYTHONPATH: ${{ github.workspace }}/backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install ruff==0.4.4

      - name: Smoke test CI runner
        run: python -c "import tools.run_ci; print('[SMOKE] run_ci.py imports OK')"

      - name: Run CI
        run: python tools/run_ci.py

      - name: Run Strict Validation (Read-Only Phase)
        run: |
          ruff format --check .
          ruff check .
