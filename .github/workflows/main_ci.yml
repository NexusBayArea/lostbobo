name: "v3.5.0 Deterministic Unified CI"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  validate:
    name: Backend Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: |
          uv pip install --system ruff
          uv pip install --system -r backend/requirements.txt

      - name: Ruff lint
        run: python -m ruff check backend/ --config backend/pyproject.toml

      - name: Ruff format check
        run: python -m ruff format backend/ --check --config backend/pyproject.toml

      - name: Bootstrap contract
        run: |
          export PYTHONPATH=$GITHUB_WORKSPACE
          python -m tools.bootstrap ci

  build-worker:
    name: Build & Push Worker
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/worker/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/simhpc-worker:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/simhpc-worker:latest
