name: Deploy Frontend (Vercel)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      # 1. Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Inject Infisical secrets
      - name: Inject Infisical secrets
        uses: Infisical/secrets-action@v1.0.15
        with:
          method: "oidc"
          identity-id: "cffe0e20-3898-4cc1-bcfb-35cdceab5886"
          project-slug: "${{ vars.INFISICAL_PROJECT_SLUG }}"
          env-slug: "prod"

      # 3. Setup Node
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: apps/frontend/package-lock.json

      # 4. Install deps
      - name: Install dependencies
        run: npm ci
        working-directory: apps/frontend

      # 5. Build frontend (Vite sees env from Infisical)
      - name: Build app
        run: npm run build
        working-directory: apps/frontend

      # 6. Deploy to Vercel (from dist/ output)
      - name: Deploy to Vercel
        run: npx vercel deploy --prod --token=$VERCEL_TOKEN
        working-directory: apps/frontend
        env:
          VERCEL_ORG_ID: $VERCEL_ORG_ID
          VERCEL_PROJECT_ID: $VERCEL_PROJECT_ID
