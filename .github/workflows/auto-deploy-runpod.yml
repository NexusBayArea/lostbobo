name: Auto-Deploy to RunPod (Post-Image-Push)

on:
  workflow_run:
    workflows: ["Deploy SimHPC"]
    types: [completed]
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  auto-deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Reset RunPod to pull latest image
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
          RUNPOD_ID: ${{ secrets.RUNPOD_ID }}
        run: |
          echo "Checking pod status for: $RUNPOD_ID"
          
          # First check current status
          status_response=$(curl -s -X POST "https://api.runpod.io/graphql" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $RUNPOD_API_KEY" \
            -d "{\"query\": \"query { pod(input: { podId: \\\"$RUNPOD_ID\\\" }) { id desiredStatus } }\"}")
          
          echo "Status check: $status_response"
          
          # Try podReset first (preferred method - pulls fresh image)
          echo "Attempting podReset..."
          response=$(curl -s -X POST "https://api.runpod.io/graphql" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $RUNPOD_API_KEY" \
            -d "{\"query\": \"mutation { podReset(input: { podId: \\\"$RUNPOD_ID\\\" }) { id } }\"}")
          
          echo "podReset response: $response"
          
          # Check if podReset succeeded
          if echo "$response" | grep -q "\"errors\""; then
            echo "podReset failed, falling back to stop+resume cycle..."
            
            # Fallback: podStop
            echo "Stopping pod: $RUNPOD_ID"
            stop_response=$(curl -s -X POST "https://api.runpod.io/graphql" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer $RUNPOD_API_KEY" \
              -d "{\"query\": \"mutation { podStop(input: { podId: \\\"$RUNPOD_ID\\\" }) { id } }\"}")
            echo "Stop response: $stop_response"
            
            # Wait for stopped
            sleep 5
            
            # Fallback: podResume
            echo "Resuming pod: $RUNPOD_ID"
            resume_response=$(curl -s -X POST "https://api.runpod.io/graphql" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer $RUNPOD_API_KEY" \
              -d "{\"query\": \"mutation { podResume(input: { podId: \\\"$RUNPOD_ID\\\", gpuCount: 1 }) { id } }\"}")
            echo "Resume response: $resume_response"
            
            if echo "$resume_response" | grep -q "\"errors\""; then
              echo "Fallback also failed!"
              exit 1
            fi
            echo "Pod cycle (stop+resume) completed"
          else
            echo "Pod reset successfully triggered"
          fi

      - name: Wait for pod
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
          RUNPOD_ID: ${{ secrets.RUNPOD_ID }}
        run: |
          attempt=0
          while [ $attempt -lt 20 ]; do
            attempt=$((attempt + 1))
            status_response=$(curl -s -X POST "https://api.runpod.io/graphql" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer $RUNPOD_API_KEY" \
              -d "{\"query\": \"query { pod(input: { podId: \\\"$RUNPOD_ID\\\" }) { id desiredStatus } }\"}")
            current_status=$(echo "$status_response" | grep -o "\"desiredStatus\":\"[^\"]*\"" | head -1 | cut -d'"' -f4)
            if [ "$current_status" = "RUNNING" ]; then
              echo "Pod RUNNING"
              exit 0
            fi
            sleep 5
          done
          exit 1