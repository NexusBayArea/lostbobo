name: "Setup Python + uv (cached)"

description: |
  Install uv, create venv, cache both uv and venv, and install dependencies.
  Reusable across all CI jobs for 30-60% speedup.

runs:
  using: "composite"
  steps:
    - name: Install uv
      shell: bash
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        echo "$HOME/.local/bin" >> $GITHUB_PATH

    - name: Cache uv
      uses: actions/cache@v4
      with:
        path: ~/.cache/uv
        key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
        restore-keys: |
          uv-${{ runner.os }}-

    - name: Cache venv
      uses: actions/cache@v4
      with:
        path: .venv
        key: venv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
        restore-keys: |
          venv-${{ runner.os }}-

    - name: Create virtual environment
      shell: bash
      run: |
        uv venv

    - name: Install dependencies
      shell: bash
      run: |
        uv pip install -e .[dev]