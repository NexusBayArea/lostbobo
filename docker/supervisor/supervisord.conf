[supervisord]
nodaemon=true
logfile=/dev/null
pidfile=/tmp/supervisord.pid

[program:api]
command=python3 -m uvicorn app.main:app --host 0.0.0.0 --port 8080 --workers 1
directory=/app
autostart=true
autorestart=true
startretries=3
stdout_logfile=/dev/stdout
stderr_logfile=/dev/stderr
priority=1

[program:worker]
command=python3 -u app/services/worker/worker.py
directory=/app
autostart=true
autorestart=true
startretries=3
stdout_logfile=/dev/stdout
stderr_logfile=/dev/stderr
priority=2

[program:autoscaler]
command=python3 -u app/services/worker/autoscaler.py
directory=/app
autostart=true
autorestart=true
startretries=3
stdout_logfile=/dev/stdout
stderr_logfile=/dev/stderr
priority=3
