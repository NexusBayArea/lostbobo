version: "3.9"

services:
  gateway:
    build:
      context: ..
      dockerfile: services/gateway/Dockerfile
    container_name: simhpc-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - RAG_SERVICE_HOST=rag-service
      - RAG_SERVICE_PORT=50051
      - MODULE_RUNTIME_HOST=module-runtime
      - MODULE_RUNTIME_PORT=50052
      - ENVIRONMENT=production
      - INFISICAL_CLIENT_ID=${INFISICAL_CLIENT_ID}
      - INFISICAL_CLIENT_SECRET=${INFISICAL_CLIENT_SECRET}
      - INFISICAL_PROJECT_ID=${INFISICAL_PROJECT_ID}
      - INFISICAL_ENV=production
    depends_on:
      - rag-service
      - module-runtime
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - simhpc-internal

  rag-service:
    build:
      context: ..
      dockerfile: services/rag-service/Dockerfile
    container_name: simhpc-rag
    restart: unless-stopped
    ports:
      - "50051:50051"
    environment:
      - INFISICAL_CLIENT_ID=${INFISICAL_CLIENT_ID}
      - INFISICAL_CLIENT_SECRET=${INFISICAL_CLIENT_SECRET}
      - INFISICAL_PROJECT_ID=${INFISICAL_PROJECT_ID}
      - INFISICAL_ENV=production
      - VECTOR_DIM=768
    healthcheck:
      test: ["CMD", "python", "-c", "import grpc; ch = grpc.insecure_channel('localhost:50051'); grpc.channel_ready_future(ch).result(timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - simhpc-internal

  module-runtime:
    build:
      context: ..
      dockerfile: services/module-runtime/Dockerfile
    container_name: simhpc-modules
    restart: unless-stopped
    ports:
      - "50052:50052"
    environment:
      - INFISICAL_CLIENT_ID=${INFISICAL_CLIENT_ID}
      - INFISICAL_CLIENT_SECRET=${INFISICAL_CLIENT_SECRET}
      - INFISICAL_PROJECT_ID=${INFISICAL_PROJECT_ID}
      - INFISICAL_ENV=production
    volumes:
      - ../plugins:/app/plugins:ro
    depends_on:
      - gateway
    healthcheck:
      test: ["CMD", "python", "-c", "import grpc; ch = grpc.insecure_channel('localhost:50052'); grpc.channel_ready_future(ch).result(timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - simhpc-internal

  worker:
    build:
      context: ..
      dockerfile: services/worker/Dockerfile
    container_name: simhpc-worker
    restart: unless-stopped
    environment:
      - INFISICAL_CLIENT_ID=${INFISICAL_CLIENT_ID}
      - INFISICAL_CLIENT_SECRET=${INFISICAL_CLIENT_SECRET}
      - INFISICAL_PROJECT_ID=${INFISICAL_PROJECT_ID}
      - INFISICAL_ENV=production
      - POLL_INTERVAL=5
    networks:
      - simhpc-internal

networks:
  simhpc-internal:
    driver: bridge
