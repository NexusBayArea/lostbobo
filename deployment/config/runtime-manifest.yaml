manifest_version: "1.0"
runtime_version: "0.1.0-gamma"
build_date: "${BUILD_DATE}"
git_commit: "${GIT_COMMIT}"

components:
  control_plane:
    - name: gateway
      version: "${RUNTIME_VERSION}"
      ports: [8080]
      health_check: "/health"
    - name: module-runtime
      version: "${RUNTIME_VERSION}"
      ports: [50052]
    - name: worker
      version: "${RUNTIME_VERSION}"

  reasoning_plane:
    - name: rag-service
      version: "${RUNTIME_VERSION}"
      ports: [50051]
      provider: "deepseek"
      embedding_model: "text-embedding-ada-002"
      reason_model: "deepseek-chat"

  simulation_plane:
    - name: gpu-worker
      version: "${RUNTIME_VERSION}"
      ports: [50053]
      gpu_required: true
      gpu_min_memory_mb: 40960

  data_plane:
    - name: supabase
      external: true

network_policies:
  simhpc-internal:
    internal: true
    description: "All VPS services on internal bridge"

guild_rails_compliance:
  kernel_centered_execution: true
  supabase_orchestration_truth: true
  no_internal_api_py: true
  infisical_secrets: true
  deterministic_replay: true
  plugin_first: true
  domain_agnostic_core: true
