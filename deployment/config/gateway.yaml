gateway:
  host: "0.0.0.0"
  port: 8080
  log_level: "INFO"
  cors_origins: ["*"]

services:
  rag:
    host: "rag-service"
    port: 50051
  module_runtime:
    host: "module-runtime"
    port: 50052

auth:
  jwt_secret: "${JWT_SECRET}"
  algorithm: "HS256"
  token_expiry_minutes: 60

rate_limiting:
  enabled: true
  requests_per_minute: 100
