rag_service:
  host: "0.0.0.0"
  port: 50051
  log_level: "INFO"

deepseek:
  model: "deepseek-chat"
  embedding_model: "text-embedding-ada-002"
  base_url: "https://api.deepseek.com/v1"
  timeout_seconds: 120

vector_store:
  provider: "supabase"
  table: "rag_documents"
  dimensions: 768
  match_function: "match_documents"

graph_rag:
  enabled: true
  max_depth: 3
  cache_ttl_seconds: 300

agentic_rag:
  enabled: true
  max_steps: 3
  reflection_model: "deepseek-chat"
