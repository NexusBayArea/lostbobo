probes:
  gateway:
    liveness:
      httpGet:
        path: /health
        port: 8080
      initialDelaySeconds: 30
      periodSeconds: 30
    readiness:
      httpGet:
        path: /health
        port: 8080
      initialDelaySeconds: 10
      periodSeconds: 10

  rag-service:
    liveness:
      exec:
        command:
          - python
          - -c
          - "import grpc; ch = grpc.insecure_channel('localhost:50051'); grpc.channel_ready_future(ch).result(timeout=5)"
      initialDelaySeconds: 60
      periodSeconds: 30
    readiness:
      exec:
        command:
          - python
          - -c
          - "import grpc; ch = grpc.insecure_channel('localhost:50051'); grpc.channel_ready_future(ch).result(timeout=2)"
      initialDelaySeconds: 30
      periodSeconds: 10

  module-runtime:
    liveness:
      exec:
        command:
          - python
          - -c
          - "import grpc; ch = grpc.insecure_channel('localhost:50052'); grpc.channel_ready_future(ch).result(timeout=5)"
      initialDelaySeconds: 30
      periodSeconds: 30
    readiness:
      exec:
        command:
          - python
          - -c
          - "import grpc; ch = grpc.insecure_channel('localhost:50052'); grpc.channel_ready_future(ch).result(timeout=2)"
      initialDelaySeconds: 15
      periodSeconds: 10
