apiVersion: apps/v1
kind: Deployment
metadata:
  name: simhpc-core
  namespace: {{ .Values.namespace }}
  labels:
    app: simhpc-core
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: simhpc-core
  template:
    metadata:
      labels:
        app: simhpc-core
    spec:
      containers:
      - name: core
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        resources:
          requests:
            cpu: {{ .Values.resources.requests.cpu }}
            memory: {{ .Values.resources.requests.memory }}
          limits:
            cpu: {{ .Values.resources.limits.cpu }}
            memory: {{ .Values.resources.limits.memory }}
        envFrom:
        - secretRef:
            name: infisical-bootstrap
        ports:
        - containerPort: 8000
          name: http
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
