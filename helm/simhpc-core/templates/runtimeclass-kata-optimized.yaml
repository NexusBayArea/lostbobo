apiVersion: node.k8s.io/v1
kind: RuntimeClass
metadata:
  name: kata-optimized
handler: kata
overhead:
  podFixed:
    cpu: "150m"
    memory: "180Mi"
scheduling:
  nodeSelector:
    kata-optimized: "true"
  tolerations:
    - key: kata
      operator: Equal
      value: "true"
      effect: NoSchedule
