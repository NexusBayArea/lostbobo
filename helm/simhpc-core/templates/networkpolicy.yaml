apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: simhpc-core-egress
  namespace: {{ .Values.namespace }}
spec:
  podSelector:
    matchLabels:
      app: simhpc-core
  policyTypes:
  - Egress
  egress:
  - to:
    - podSelector:
        matchLabels:
          app: thanos-querier
    - podSelector:
        matchLabels:
          app: falco
    ports:
    - protocol: TCP
      port: 9090
    - protocol: TCP
      port: 10901
