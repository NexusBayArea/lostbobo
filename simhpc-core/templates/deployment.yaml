apiVersion: apps/v1
kind: Deployment
metadata:
  name: simhpc-core
  labels:
    app: simhpc-core
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: simhpc-core
  template:
    metadata:
      labels:
        app: simhpc-core
      annotations:
        cluster-autoscaler.kubernetes.io/safe-to-evict: "true"
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: simhpc-core
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: "4"
              memory: "16Gi"
            limits:
              cpu: "12"
              memory: "48Gi"
          envFrom:
            - configMapRef:
                name: simhpc-core-config
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
