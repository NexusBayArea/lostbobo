# {{- if .Values.karpenter.enabled }}
apiVersion: karpenter.k8s.aws/v1beta1
kind: EC2NodeClass
metadata:
  name: simhpc-gpu
spec:
  amiFamily: AL2023
  role: "KarpenterNodeRole"
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: "simhpc"
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: "simhpc"
  instanceProfile: "KarpenterNodeInstanceProfile-simhpc"
  blockDeviceMappings:
    - deviceName: /dev/xvda
      ebs:
        volumeSize: 200Gi
        volumeType: gp3
        encrypted: true
  tags:
    simhpc/workload: gpu
{{- end }}
