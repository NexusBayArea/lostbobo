# {{- if .Values.mig.controller.enabled }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: simhpc-mig-controller
  namespace: simhpc

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: simhpc-mig-controller
rules:
  - apiGroups: [""]
    resources: ["nodes", "nodes/status"]
    verbs: ["get", "list", "watch", "patch", "update"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "delete", "evict"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: simhpc-mig-controller
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: simhpc-mig-controller
subjects:
  - kind: ServiceAccount
    name: simhpc-mig-controller
    namespace: simhpc
{{- end }}
