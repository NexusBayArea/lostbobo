# {{- if .Values.mig.controller.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: simhpc-mig-controller
  namespace: simhpc
spec:
  schedule: {{ .Values.mig.controller.schedule | quote }}
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: simhpc-mig-controller
          containers:
            - name: mig-controller
              image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
              command:
                - python
                - -m
                - backend.core.hardware.mig.controller
              envFrom:
                - configMapRef:
                    name: simhpc-core-config
              resources:
                requests:
                  cpu: "500m"
                  memory: "1Gi"
                limits:
                  cpu: "1"
                  memory: "2Gi"
          restartPolicy: OnFailure
{{- end }}
