replicaCount: 1

image:
  repository: your-registry/simhpc-core
  pullPolicy: IfNotPresent
  tag: "latest"

service:
  type: ClusterIP
  port: 8000

# GPU Scheduling (Fractional + MPS + Isolation)
gpu:
  enabled: true
  count: 1.0
  fractional:
    enabled: true
  mps:
    enabled: true
    activeThreadPercentage: 95
  nodeSelector:
    nvidia.com/gpu: "true"
  tolerations:
    - key: nvidia.com/gpu
      operator: Exists
      effect: NoSchedule
  resources:
    requests:
      nvidia.com/gpu: "1"
    limits:
      nvidia.com/gpu: "1"

ingress:
  enabled: true
  className: nginx
  host: simhpc.yourdomain.com

supabase:
  url: ""
  key: ""

infisical:
  token: ""
  projectId: ""

env:
  INFISICAL_TOKEN: ""
  INFISICAL_PROJECT_ID: ""
  SUPABASE_URL: ""
  SUPABASE_SERVICE_KEY: ""
  EVENT_BUS_MAX_QUEUE_DEPTH: "1000"

# Cluster Autoscaler Integration
clusterAutoscaler:
  enabled: true
  nodeGroups:
    - gpu-general
    - gpu-high-mem
  scaleUp:
    unneededTime: 2m
    utilizationThreshold: 0.7
  scaleDown:
    unneededTime: 10m
    utilizationThreshold: 0.5

# Karpenter Configuration
karpenter:
  enabled: false
  nodePools:
    - name: gpu-general
      instanceFamily: ["g4dn", "g5", "p3", "p4d", "p5"]
      minSize: 2
      maxSize: 20
      gpuCount: 1
      taints:
        - key: nvidia.com/gpu
          value: "true"
          effect: NoSchedule
      labels:
        simhpc/workload: gpu
        nvidia.com/gpu: "true"

# GPU Monitoring
monitoring:
  gpu:
    enabled: true
    dcgm:
      enabled: true
      scrapeInterval: 15s
    prometheus:
      scrapeInterval: 15s

# GPU Cost Optimization
costOptimization:
  spotPriority: true
  spotThreshold: 0.4
  minSpotSavings: 0.6

# Plugin Configuration with VirtioFS Optimizations
plugin:
  enabled: true
  replicaCount: 1
  runtimeClassName: kata-optimized
  image:
    repository: ghcr.io/simhpc/your-plugin
    pullPolicy: IfNotPresent
    tag: "latest"
  service:
    port: 8080
  hostPath: "/host/path/to/plugin/code"
  mountPath: "/app"
  readOnly: true
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "2"
      memory: "4Gi"
  env:
    - name: PLUGIN_ENV
      value: "production"
  envFrom:
    - configMapRef:
        name: plugin-config
  livenessProbe:
    httpGet:
      path: /health
      port: 8080
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  readinessProbe:
    httpGet:
      path: /ready
      port: 8080
    initialDelaySeconds: 15
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3
  prometheusScrape:
    enabled: true
    port: 9090
  podAnnotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9090"
    prometheus.io/path: "/metrics"
